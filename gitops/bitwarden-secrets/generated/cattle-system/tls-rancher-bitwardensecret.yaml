apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: bw-tls-rancher
  namespace: cattle-system
spec:
  organizationId: "202b0b27-b135-44cd-a969-b43a003ad670"
  secretName: tls-rancher
  onlyMappedSecrets: true
  map:
    - bwSecretId: 728767a4-1fad-4325-b3df-b448008b8501
      secretKeyName: tls.crt
    - bwSecretId: 75ca472d-ab9d-4953-b0e3-b448008b8546
      secretKeyName: tls.key
  authToken:
    secretName: bw-auth-token
    secretKey: token
