# BitwardenSecret: syncs the Cloudflare API token into cert-manager namespace.
# Required by the letsencrypt-prod ClusterIssuer for DNS-01 challenge.
#
# Prerequisites:
#   1. Store your Cloudflare API token in Bitwarden Secrets Manager.
#   2. Replace the bwSecretId below with the UUID from: bws secret list
#   3. The token needs: Zone → DNS → Edit permission for owl.red
---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: bw-cloudflare-api-token
  namespace: cert-manager
spec:
  organizationId: "202b0b27-b135-44cd-a969-b43a003ad670"
  secretName: cloudflare-api-token
  onlyMappedSecrets: true
  map:
    - bwSecretId: "72cb2e7d-be1d-49c2-811a-b43a004c075d"
      secretKeyName: api-token
  authToken:
    secretName: bw-auth-token
    secretKey: token
