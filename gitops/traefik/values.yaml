service:
  type: LoadBalancer
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.0.10.201"

deployment:
  replicas: 2

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

logs:
  general:
    level: INFO

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    redirectTo:
      port: websecure
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    tls:
      enabled: true
