apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-normalize
  namespace: traefik
spec:
  redirectRegex:
    regex: "^https?://traefik\\.owl\\.red(?:$|/$|/dashboard$)"
    replacement: "https://traefik.owl.red/dashboard/"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-normalize
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.owl.red`) && (Path(`/`) || Path(`/dashboard`))
      kind: Rule
      priority: 100
      middlewares:
        - name: traefik-dashboard-normalize
      services:
        - kind: TraefikService
          name: api@internal
  tls: {}
