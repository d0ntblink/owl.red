apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdm
  namespace: infra-services
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: https
    # Skip-verify scoped to this backend only (PDM self-signed cert); see
    # gitops/pdm/pdm-serverstransport.yaml.
    traefik.ingress.kubernetes.io/service.serverstransport: infra-services-pdm-insecure@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: pdm.owl.red
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pdm-external
                port:
                  number: 8443
