---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: owl-vip-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.0.10.200-10.0.10.250
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: technitium-vip-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.0.10.30/32
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: owl-l2-advert
  namespace: metallb-system
spec:
  ipAddressPools:
    - owl-vip-pool
    - technitium-vip-pool
