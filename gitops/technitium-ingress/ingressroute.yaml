# Traefik IngressRoute — terminates TLS, proxies to Technitium LXC on port 5380.
# HTTP→HTTPS redirect handled globally by Traefik's web entryPoint config.
# The Technitium backend is plain HTTP on port 5380, so no backend TLS verification
# is involved (the cluster-wide insecureSkipVerify was removed; only PDM needs a
# scoped ServersTransport — see gitops/pdm/pdm-serverstransport.yaml).
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: technitium
  namespace: technitium
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dns.owl.red`)
      kind: Rule
      services:
        - name: technitium
          port: 5380
  tls:
    secretName: technitium-tls
