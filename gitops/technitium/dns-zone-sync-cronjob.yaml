apiVersion: batch/v1
kind: CronJob
metadata:
  name: technitium-zone-sync
  namespace: technitium-namespace
  labels:
    app.kubernetes.io/name: technitium
    app.kubernetes.io/component: dns-zone-sync
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: technitium
            app.kubernetes.io/component: dns-zone-sync
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            - name: zone-sync
              image: curlimages/curl:8.8.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /opt/technitium/sync-zone.sh
              env:
                - name: TECHNITIUM_API_URL
                  value: http://technitium-web.technitium-namespace.svc.cluster.local
                - name: DNS_ZONE_NAME
                  value: owl.red
                - name: ZONE_FILE_PATH
                  value: /etc/technitium-zones/owl.red.zone
                - name: TECHNITIUM_TOKEN_FILE
                  value: /var/run/secrets/technitium/token
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsNonRoot: true
              volumeMounts:
                - name: zone-sync-script
                  mountPath: /opt/technitium
                  readOnly: true
                - name: zone-source
                  mountPath: /etc/technitium-zones
                  readOnly: true
                - name: api-token
                  mountPath: /var/run/secrets/technitium
                  readOnly: true
          volumes:
            - name: zone-sync-script
              configMap:
                name: technitium-zone-sync-script
                defaultMode: 493
            - name: zone-source
              configMap:
                name: technitium-zone-owl-red
            - name: api-token
              secret:
                secretName: technitium-api-token
                items:
                  - key: token
                    path: token
