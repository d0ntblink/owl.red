apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: technitium
  namespace: technitium-namespace
  labels:
    app.kubernetes.io/name: technitium
spec:
  serviceName: technitium
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: technitium
  template:
    metadata:
      labels:
        app.kubernetes.io/name: technitium
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1-talos
      containers:
        - name: technitium
          image: technitium/dns-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: web
              containerPort: 5380
              protocol: TCP
          env:
            - name: DNS_SERVER_DOMAIN
              value: owl.red
            - name: DNS_SERVER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: technitium-admin
                  key: admin-password
            - name: DNS_SERVER_PREFER_IPV6
              value: "false"
            - name: DNS_SERVER_LOG_USING_LOCAL_TIME
              value: "true"
            - name: TZ
              value: UTC
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /etc/dns
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: technitium-data
