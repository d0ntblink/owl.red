apiVersion: v1
kind: ConfigMap
metadata:
  name: technitium-zone-sync-script
  namespace: technitium-namespace
  labels:
    app.kubernetes.io/name: technitium
    app.kubernetes.io/component: dns-zone-sync
data:
  sync-zone.sh: |
    #!/bin/sh
    set -eu

    API_URL="${TECHNITIUM_API_URL:-http://technitium-web.technitium-namespace.svc.cluster.local}"
    ZONE_NAME="${DNS_ZONE_NAME:-owl.red}"
    ZONE_FILE="${ZONE_FILE_PATH:-/etc/technitium-zones/owl.red.zone}"
    TOKEN_FILE="${TECHNITIUM_TOKEN_FILE:-/var/run/secrets/technitium/token}"

    if [ ! -s "${TOKEN_FILE}" ]; then
      echo "ERROR: missing Technitium API token file at ${TOKEN_FILE}" >&2
      exit 1
    fi

    if [ ! -s "${ZONE_FILE}" ]; then
      echo "ERROR: missing zone file at ${ZONE_FILE}" >&2
      exit 1
    fi

    TOKEN="$(tr -d '\r\n' < "${TOKEN_FILE}")"
    AUTH_HEADER="Authorization: Bearer ${TOKEN}"

    ZONE_LIST_JSON="$(curl -fsS -H "${AUTH_HEADER}" "${API_URL}/api/zones/list")"
    ZONE_LIST_COMPACT="$(printf '%s' "${ZONE_LIST_JSON}" | tr -d '\n\r\t ')"

    if ! printf '%s' "${ZONE_LIST_COMPACT}" | grep -Fq "\"name\":\"${ZONE_NAME}\""; then
      echo "INFO: zone ${ZONE_NAME} does not exist; creating Primary zone"
      curl -fsS -X POST -H "${AUTH_HEADER}" \
        "${API_URL}/api/zones/create?zone=${ZONE_NAME}&type=Primary" >/dev/null
    fi

    curl -fsS -X POST \
      -H "${AUTH_HEADER}" \
      -H "Content-Type: text/plain" \
      --data-binary @"${ZONE_FILE}" \
      "${API_URL}/api/zones/import?zone=${ZONE_NAME}&overwrite=true&overwriteZone=true&overwriteSoaSerial=false" >/dev/null

    echo "INFO: synchronized zone ${ZONE_NAME} from ${ZONE_FILE}"
