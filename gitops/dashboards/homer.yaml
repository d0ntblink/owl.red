apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: dashboards
data:
  config.yml: |
    title: "owl.red Homer"
    subtitle: "Cappuccino Operations Grid"
    logo: "logo.png"
    header: true
    footer: false
    theme: default

    colors:
      light:
        highlight-primary: "#89b4fa"
        highlight-secondary: "#cba6f7"
        highlight-hover: "#fab387"
        background: "#f5e0dc"
        card-background: "#eff1f5"
        text: "#4c4f69"
        text-header: "#1e1e2e"
        text-title: "#303446"
        text-subtitle: "#5c5f77"
        card-shadow: rgba(0, 0, 0, 0.15)
        link: "#1e66f5"
        link-hover: "#ea76cb"
      dark:
        highlight-primary: "#89b4fa"
        highlight-secondary: "#cba6f7"
        highlight-hover: "#fab387"
        background: "#1e1e2e"
        card-background: "#313244"
        text: "#cdd6f4"
        text-header: "#f5e0dc"
        text-title: "#bac2de"
        text-subtitle: "#a6adc8"
        card-shadow: rgba(0, 0, 0, 0.45)
        link: "#89b4fa"
        link-hover: "#fab387"

    message:
      style: "is-dark"
      title: "Dashboard Bake-off"
      icon: "fa fa-mug-hot"
      content: "Three contenders. One winner. Compare Flame, Homepage, and Homer with your real infra links."

    links:
      - name: "Rancher"
        icon: "fas fa-dharmachakra"
        url: "https://rancher.owl.red"
      - name: "DNS UI"
        icon: "fas fa-network-wired"
        url: "http://dns.owl.red:5380"
      - name: "Homepage"
        icon: "fas fa-house"
        url: "https://homepage.owl.red"
      - name: "Flame"
        icon: "fas fa-fire"
        url: "https://flame.owl.red"

    services:
      - name: "Core Platform"
        icon: "fas fa-layer-group"
        items:
          - name: "Rancher"
            subtitle: "Kubernetes control center"
            tag: "now"
            url: "https://rancher.owl.red"
          - name: "Technitium DNS"
            subtitle: "Authoritative DNS control plane"
            tag: "now"
            url: "http://dns.owl.red:5380"
          - name: "Flame"
            subtitle: "App-launcher dashboard"
            tag: "now"
            url: "https://flame.owl.red"
          - name: "Homepage"
            subtitle: "Widget-rich dashboard"
            tag: "now"
            url: "https://homepage.owl.red"

      - name: "Infrastructure"
        icon: "fas fa-server"
        items:
          - name: "OPNsense"
            subtitle: "Firewall and routing"
            tag: "now"
            url: "https://edge.owl.red"
          - name: "Switch"
            subtitle: "MikroTik CSS326"
            tag: "now"
            url: "http://switch.owl.red"
          - name: "Unraid"
            subtitle: "Storage and media backbone"
            tag: "now"
            url: "http://nas.owl.red"
          - name: "PDM"
            subtitle: "Proxmox Datacenter Manager"
            tag: "now"
            url: "http://pdm.owl.red"
          - name: "PBS"
            subtitle: "Backup target"
            tag: "now"
            url: "https://pbs.owl.red"

      - name: "Future Roadmap"
        icon: "fas fa-rocket"
        items:
          - name: "Plex"
            subtitle: "Media streaming"
            tag: "later"
            url: "https://plex.owl.red"
          - name: "Sonarr"
            subtitle: "TV automation"
            tag: "later"
            url: "https://sonarr.owl.red"
          - name: "Radarr"
            subtitle: "Movie automation"
            tag: "later"
            url: "https://radarr.owl.red"
          - name: "Prowlarr"
            subtitle: "Indexer management"
            tag: "later"
            url: "https://prowlarr.owl.red"
          - name: "qBittorrent"
            subtitle: "Download control"
            tag: "later"
            url: "https://qbittorrent.owl.red"
          - name: "Tautulli"
            subtitle: "Plex analytics"
            tag: "later"
            url: "https://tautulli.owl.red"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
  namespace: dashboards
  labels:
    app.kubernetes.io/name: homer
    app.kubernetes.io/part-of: dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homer
        app.kubernetes.io/part-of: dashboards
    spec:
      containers:
        - name: homer
          image: b4bz/homer:26.04.2
          imagePullPolicy: IfNotPresent
          env:
            - name: INIT_ASSETS
              value: "0"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          volumeMounts:
            - name: config
              mountPath: /www/assets/config.yml
              subPath: config.yml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: homer-config
---
apiVersion: v1
kind: Service
metadata:
  name: homer
  namespace: dashboards
  labels:
    app.kubernetes.io/name: homer
    app.kubernetes.io/part-of: dashboards
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: homer
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homer
  namespace: dashboards
  annotations:
    flame.pawelmalak/type: application
    flame.pawelmalak/name: Homer Dashboard
    flame.pawelmalak/url: https://homer.owl.red
    flame.pawelmalak/icon: donut
spec:
  ingressClassName: traefik
  rules:
    - host: homer.owl.red
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homer
                port:
                  number: 80
