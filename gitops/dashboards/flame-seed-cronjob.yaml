apiVersion: v1
kind: ConfigMap
metadata:
  name: flame-seed-script
  namespace: dashboards
data:
  seed.sh: |
    #!/bin/sh
    set -eu

    BASE_URL="${FLAME_BASE_URL:-http://flame.dashboards.svc.cluster.local}"
    PASSWORD_FILE="${FLAME_PASSWORD_FILE:-/var/run/secrets/flame/password}"

    i=0
    until [ "$i" -ge 30 ]; do
      if curl -fsS --max-time 3 "${BASE_URL}/api/config" >/dev/null 2>&1; then
        break
      fi
      i=$((i + 1))
      sleep 5
    done

    if [ "$i" -ge 30 ]; then
      echo "ERROR: flame API did not become ready in time" >&2
      exit 1
    fi

    if [ ! -s "${PASSWORD_FILE}" ]; then
      echo "ERROR: flame password file missing at ${PASSWORD_FILE}" >&2
      exit 1
    fi

    escape_json() {
      # Escape backslashes and quotes for safe JSON string embedding.
      printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
    }

    PASSWORD="$(tr -d '\r\n' < "${PASSWORD_FILE}")"
    PASSWORD_ESCAPED="$(escape_json "${PASSWORD}")"
    LOGIN_PAYLOAD="$(printf '{"password":"%s","duration":"14d"}' "${PASSWORD_ESCAPED}")"

    AUTH_RESPONSE_FILE="/tmp/flame-auth-response.json"
    AUTH_CODE="$(curl -sS -o "${AUTH_RESPONSE_FILE}" -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d "${LOGIN_PAYLOAD}" "${BASE_URL}/api/auth")"
    if [ "${AUTH_CODE}" -lt 200 ] || [ "${AUTH_CODE}" -ge 300 ]; then
      echo "ERROR: flame auth failed with HTTP ${AUTH_CODE}: $(cat "${AUTH_RESPONSE_FILE}")" >&2
      exit 1
    fi

    TOKEN="$(sed -n 's/.*"token":"\([^"]*\)".*/\1/p' "${AUTH_RESPONSE_FILE}")"
    rm -f "${AUTH_RESPONSE_FILE}"

    if [ -z "${TOKEN}" ]; then
      echo "ERROR: failed to obtain Flame auth token" >&2
      exit 1
    fi

    AUTH_HEADER="Authorization-Flame: Bearer ${TOKEN}"

    curl -fsS -X PUT -H "${AUTH_HEADER}" -H 'Content-Type: application/json' \
      -d '{"customTitle":"Flame: Cappuccino Command Deck","kubernetesApps":true,"showTime":true,"defaultSearchProvider":"g","pinAppsByDefault":true}' \
      "${BASE_URL}/api/config" >/dev/null

    curl -fsS -X PUT -H "${AUTH_HEADER}" -H 'Content-Type: application/json' \
      -d '{"styles":"body{background:#1e1e2e!important;color:#cdd6f4!important;} .Header,.SearchBar,.Apps{background:#181825!important;border:1px solid rgba(203,166,247,.35)!important;} .AppCard{background:#313244!important;border:1px solid rgba(166,227,161,.2)!important;box-shadow:0 10px 25px rgba(0,0,0,.35)!important;} a,.AppCardLink{color:#89b4fa!important;} a:hover,.AppCardLink:hover{color:#fab387!important;}"}' \
      "${BASE_URL}/api/config/0/css" >/dev/null

    APPS_JSON="$(curl -fsS -H "${AUTH_HEADER}" "${BASE_URL}/api/apps")"

    ensure_app() {
      name="$1"
      url="$2"
      description="$3"
      icon="$4"

      if printf '%s' "${APPS_JSON}" | grep -Fq "\"name\":\"${name}\""; then
        echo "INFO: app ${name} already exists"
        return 0
      fi

      payload="$(printf '{"name":"%s","url":"%s","description":"%s","icon":"%s","isPublic":1}' "${name}" "${url}" "${description}" "${icon}")"
      curl -fsS -X POST -H "${AUTH_HEADER}" -H 'Content-Type: application/json' -d "${payload}" "${BASE_URL}/api/apps" >/dev/null
      APPS_JSON="$(printf '%s' "${APPS_JSON}"; printf '{"name":"%s"}' "${name}")"
      echo "INFO: created app ${name}"
    }

    ensure_app "Rancher" "https://rancher.owl.red" "Kubernetes operations and lifecycle" "rancher"
    ensure_app "Technitium DNS" "http://dns.owl.red:5380" "Authoritative DNS control plane" "dns"
    ensure_app "Flame" "https://flame.owl.red" "Flame dashboard endpoint" "fire"
    ensure_app "Homepage" "https://homepage.owl.red" "Homepage dashboard endpoint" "dashboard"
    ensure_app "Homer" "https://homer.owl.red" "Homer dashboard endpoint" "homer"
    ensure_app "OPNsense" "https://edge.owl.red" "Firewall and routing control" "router"
    ensure_app "Switch" "http://switch.owl.red" "MikroTik CSS326 management" "switch"
    ensure_app "PDM" "http://pdm.owl.red" "Proxmox Datacenter Manager" "proxmox"
    ensure_app "PBS" "https://pbs.owl.red" "Proxmox Backup Server" "backup"
    ensure_app "Unraid" "http://nas.owl.red" "Storage and media backbone" "server"
    ensure_app "cp1 Proxmox" "https://cp1.pve.owl.red:8006" "Control plane host 1" "proxmox"
    ensure_app "cp2 Proxmox" "https://cp2.pve.owl.red:8006" "Control plane host 2" "proxmox"
    ensure_app "cp3 Proxmox" "https://cp3.pve.owl.red:8006" "Control plane host 3" "proxmox"
    ensure_app "worker1 Proxmox" "https://worker1.pve.owl.red:8006" "Worker host" "proxmox"

    ensure_app "Plex (planned)" "https://plex.owl.red" "Future media streaming endpoint" "plex"
    ensure_app "Sonarr (planned)" "https://sonarr.owl.red" "Future TV automation endpoint" "sonarr"
    ensure_app "Radarr (planned)" "https://radarr.owl.red" "Future movie automation endpoint" "radarr"
    ensure_app "Prowlarr (planned)" "https://prowlarr.owl.red" "Future indexer gateway" "prowlarr"
    ensure_app "qBittorrent (planned)" "https://qbittorrent.owl.red" "Future download control" "qbittorrent"
    ensure_app "Tautulli (planned)" "https://tautulli.owl.red" "Future Plex analytics" "analytics"

    echo "INFO: Flame seed completed"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: flame-seed
  namespace: dashboards
  labels:
    app.kubernetes.io/name: flame-seed
    app.kubernetes.io/part-of: dashboards
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: flame-seed
            app.kubernetes.io/part-of: dashboards
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            - name: seed
              image: curlimages/curl:8.8.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /opt/flame-seed/seed.sh
              env:
                - name: FLAME_BASE_URL
                  value: http://flame.dashboards.svc.cluster.local
                - name: FLAME_PASSWORD_FILE
                  value: /var/run/secrets/flame/password
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsNonRoot: true
              volumeMounts:
                - name: script
                  mountPath: /opt/flame-seed
                  readOnly: true
                - name: password
                  mountPath: /var/run/secrets/flame
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: flame-seed-script
                defaultMode: 493
            - name: password
              secret:
                secretName: dashboard-flame-auth
                optional: false
                items:
                  - key: password
                    path: password
