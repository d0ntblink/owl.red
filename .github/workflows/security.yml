name: security

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so historical commits are scanned too
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # .gitleaks.toml in the repo root is auto-detected.
          # GITLEAKS_LICENSE is only required for repos owned by a GitHub *organization*.

  bitwarden-placeholders:
    name: BitwardenSecret placeholder guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject placeholder/invalid bwSecretId (see docs/issues/007)
        run: bash scripts/check-bitwarden-placeholders.sh
