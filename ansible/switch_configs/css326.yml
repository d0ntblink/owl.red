---
# css326.yml — Desired state config for MikroTik CSS326-24G-2S+RM
#
# Switch identity:  switch.owl.red
# MAC:             48:8f:5a:0c:d1:82
# Serial:          CAC90C5B5282
# Location:        rack, owl.red homelab
#
# This file is the source of truth consumed directly by the swos Ansible module.
# Schema: https://github.com/lanrat/python-mikrotik-swos/blob/main/ANSIBLE.md
#
# Field notes:
#   assigned_to — metadata only, ignored by swos module
#   allow_from  — intentionally omitted to keep management unrestricted


system:
  identity: switch.owl.red
  static_ip: "10.0.10.2"
  # address_acquisition intentionally omitted — keep existing "DHCP with fallback"
  # allow_from intentionally omitted — no management access restriction

snmp:
  enabled: false               # enable when monitoring stack is ready
  community: public            # change before enabling
  contact: ""
  location: "rack, owl.red"

ports:
  # CSS326 port layout (top row = even, bottom row = odd):
  # SW02:  PP25 → cp1.pve        VLAN 10 access
  # SW04:  PP26 → cp2.pve        VLAN 10 access
  # SW06:  PP27 → cp3.pve        VLAN 10 access
  # SW08:  PP28 → worker1.pve    VLAN 10 access
  # SW10:  PP29 → storage.pve    VLAN 10 access (bond0 active / obnic0)
  # SW12:  PP30 → storage.pve    VLAN 10 access (bond0 standby / obnic1)
  # SW14:  PP31 → ipmi.storage   VLAN 10 access
  # SW16:  PP32 → pdu.owl.red    VLAN 10 access
  # SW18:  PP33 → ap.owl.red     802.1Q trunk all VLANs, 1G
  # SW22:  PP36 → network cabinet 802.1Q trunk all VLANs
  # SW23:  direct → edge.owl.red igb0 (OPNsense WAN) — not a LAN port
  # SW24:  direct → edge.pve eth0 VLAN 10 mgmt
  # SFP+1: DAC → edge.owl.red X710 iX11  (10G LAN trunk, active)
  # SFP+2: DAC → nas.owl.red 82599ES iX10 (10G storage uplink, active)
  # Odd ports 01/03/05/07/09/11/13/15/17/19/21: unpatched

  - port: 1
    name: "unpatched-01"
    enabled: false
    assigned_to: unpatched

  - port: 2
    name: "cp1.pve"
    enabled: true
    assigned_to: cp1.pve.owl.red      # 10.0.10.11 — PP25 <-> SW02

  - port: 3
    name: "unpatched-03"
    enabled: false
    assigned_to: unpatched

  - port: 4
    name: "cp2.pve"
    enabled: true
    assigned_to: cp2.pve.owl.red      # 10.0.10.12 — PP26 <-> SW04

  - port: 5
    name: "unpatched-05"
    enabled: false
    assigned_to: unpatched

  - port: 6
    name: "cp3.pve"
    enabled: true
    assigned_to: cp3.pve.owl.red      # 10.0.10.13 — PP27 <-> SW06

  - port: 7
    name: "unpatched-07"
    enabled: false
    assigned_to: unpatched

  - port: 8
    name: "worker1.pve"
    enabled: true
    assigned_to: worker1.pve.owl.red  # 10.0.10.14 — PP28 <-> SW08

  - port: 9
    name: "unpatched-09"
    enabled: false
    assigned_to: unpatched

  - port: 10
    name: "storage.pve-a"
    enabled: true
    assigned_to: storage.pve.owl.red  # 10.0.10.4 — PP29 <-> SW10 (obnic0, bond0 active)

  - port: 11
    name: "unpatched-11"
    enabled: false
    assigned_to: unpatched

  - port: 12
    name: "storage.pve-b"
    enabled: true
    assigned_to: storage.pve.owl.red  # 10.0.10.4 — PP30 <-> SW12 (obnic1, bond0 standby)

  - port: 13
    name: "unpatched-13"
    enabled: false
    assigned_to: unpatched

  - port: 14
    name: "ipmi.storage"
    enabled: true
    assigned_to: ipmi.storage.owl.red # 10.0.10.6 — PP31 <-> SW14

  - port: 15
    name: "unpatched-15"
    enabled: false
    assigned_to: unpatched

  - port: 16
    name: "pdu.owl.red"
    enabled: true
    assigned_to: pdu.owl.red          # 10.0.10.9 — PP32 <-> SW16

  - port: 17
    name: "unpatched-17"
    enabled: false
    assigned_to: unpatched

  - port: 18
    name: "ap.owl.red"
    enabled: true
    assigned_to: ap.owl.red           # 10.0.10.40 — PP33 <-> SW18 — 802.1Q trunk all VLANs

  - port: 19
    name: "unpatched-19"
    enabled: false
    assigned_to: unpatched

  - port: 20
    name: "pvt-drop-20"
    enabled: true
    assigned_to: unpatched            # VLAN 20 private-net drop (active clients seen in FDB)

  - port: 21
    name: "unpatched-21"
    enabled: false
    assigned_to: unpatched

  - port: 22
    name: "cab-trunk"
    enabled: true
    assigned_to: network-cabinet      # PP36 <-> SW22 — 802.1Q trunk all VLANs

  - port: 23
    name: "rtr-wan"
    enabled: true
    assigned_to: edge.owl.red         # direct → OPNsense igb0 WAN uplink

  - port: 24
    name: "edge.pve-mgmt"
    enabled: true
    assigned_to: edge.pve.owl.red     # direct → edge.pve eth0 VLAN 10 mgmt

  - port: 25
    name: "sfp1-opn"
    enabled: true
    assigned_to: edge.owl.red         # AQUA DAC → X710 iX11 — 10G LAN trunk (active)

  - port: 26
    name: "sfp2-nas"
    enabled: true
    assigned_to: nas.owl.red          # AQUA DAC → 82599ES iX10 — 10G storage uplink (active)

# VLAN table — created without port assignments.
# Port-VLAN assignments (access/trunk mode per port) come in Phase 2.
vlans:
  - vlan_id: 10
    member_ports: [5]          # port 5 = edge.pve trunk (VLAN 10 untagged/native)
    name: "network-devices"   # 10.0.10.0/24 — infra mgmt, DHCP 100-199 via Technitium LXC

  - vlan_id: 20
    member_ports: [5]          # port 5 = edge.pve trunk (tagged)
    name: "private-net"       # 10.0.20.0/24 — trusted wired + WiFi

  - vlan_id: 30
    member_ports: [5]          # port 5 = edge.pve trunk (tagged)
    name: "guest-net"         # 10.0.30.0/24 — guest WiFi, internet only

  - vlan_id: 40
    member_ports: [5]          # port 5 = edge.pve trunk (tagged)
    name: "iot-no-inter"      # 10.0.40.0/24 — IoT local only

  - vlan_id: 50
    member_ports: [5]          # port 5 = edge.pve trunk (tagged)
    name: "iot-with-inter"    # 10.0.50.0/24 — IoT internet permitted
