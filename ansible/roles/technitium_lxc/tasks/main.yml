---
# technitium_lxc role — configures Technitium DNS+DHCP inside the LXC
# Run after Terraform creates the container:
#   scripts/ansible-run.sh ansible-playbook \
#     -i ansible/inventory/hosts.yml \
#     ansible/playbooks/deploy-technitium-lxc.yml
#
# Required environment variables (sourced by scripts/ansible-run.sh):
#   BWS_ACCESS_TOKEN   — Bitwarden SM machine account token

- name: Install packages and Technitium
  ansible.builtin.import_tasks: install.yml

- name: Bootstrap admin account and API token via BWS
  ansible.builtin.import_tasks: bootstrap.yml

# DHCP scopes/reservations are GitOps-managed (sync.sh / technitium-sync.service);
# dhcp.yml is an intentionally-empty placeholder. See gitops/technitium/dhcp/.
- name: DHCP scopes are GitOps-managed (no imperative config here)
  ansible.builtin.import_tasks: dhcp.yml

- name: Configure Git zone sync service
  ansible.builtin.import_tasks: zone-sync.yml
