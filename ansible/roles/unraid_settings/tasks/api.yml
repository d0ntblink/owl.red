---
# API lane - Unraid GraphQL over HTTPS, run on the controller (delegate_to localhost).
# No NAS Python needed. The API key comes from the UNRAID_API_KEY env var (operator
# exports it from bw, like ansible-run.sh injects the Proxmox password - ADR 003).
#
# Idempotent: read current NTP -> compare -> only mutate on drift (and not check mode)
# -> read back and verify. Uses the researched updateSystemTime mutation, which maps to
# emhttp's Settings > Date & Time Apply (writes ident.cfg NTP_SERVER*/USE_NTP; no array/
# network/share/docker impact; reversible).

- name: Get Unraid API key from env (UNRAID_API_KEY)
  ansible.builtin.set_fact:
    _unraid_api_key: "{{ lookup('env', 'UNRAID_API_KEY') }}"
  no_log: true
  tags: [unraid_settings, api]

- name: Compute desired ntpServers (non-empty, ordered)
  ansible.builtin.set_fact:
    _desired_ntp: "{{ [unraid_ntp_server1, unraid_ntp_server2, unraid_ntp_server3, unraid_ntp_server4] | reject('equalto', '') | list }}"
  tags: [unraid_settings, api]

- name: Read current system time / NTP (GraphQL query)
  ansible.builtin.uri:
    url: "{{ unraid_graphql_url }}"
    method: POST
    headers:
      x-api-key: "{{ _unraid_api_key }}"
      Content-Type: application/json
    body_format: json
    body:
      query: "{ systemTime { useNtp timeZone ntpServers } }"
    return_content: true
    status_code: 200
    validate_certs: false
  delegate_to: localhost
  become: false
  run_once: true
  register: _systime
  no_log: true
  changed_when: false
  failed_when: >
    _systime.status != 200 or
    (_systime.json.errors is defined and (_systime.json.errors | length) > 0)
  tags: [unraid_settings, api]

- name: Extract current non-empty ntpServers
  ansible.builtin.set_fact:
    _current_ntp: "{{ _systime.json.data.systemTime.ntpServers | reject('equalto', '') | list }}"
  tags: [unraid_settings, api]

- name: Report NTP state
  ansible.builtin.debug:
    msg: "NTP current={{ _current_ntp }} desired={{ _desired_ntp }} -> {{ 'IN SYNC (no change)' if _current_ntp == _desired_ntp else 'WILL UPDATE' }}"
  tags: [unraid_settings, api]

- name: Apply updateSystemTime (NTP) - only on drift and not check mode
  ansible.builtin.uri:
    url: "{{ unraid_graphql_url }}"
    method: POST
    headers:
      x-api-key: "{{ _unraid_api_key }}"
      Content-Type: application/json
    body_format: json
    body:
      query: "mutation($i: UpdateSystemTimeInput!) { updateSystemTime(input: $i) { useNtp ntpServers timeZone } }"
      variables:
        i:
          useNtp: true
          ntpServers: "{{ _desired_ntp }}"
    return_content: true
    status_code: 200
    validate_certs: false
  delegate_to: localhost
  become: false
  run_once: true
  register: _ntp_apply
  no_log: true
  changed_when: true
  failed_when: >
    _ntp_apply.status != 200 or
    (_ntp_apply.json.errors is defined and (_ntp_apply.json.errors | length) > 0)
  when:
    - _current_ntp != _desired_ntp
    - not ansible_check_mode
  tags: [unraid_settings, api]

- name: Verify NTP after write (re-read)
  ansible.builtin.uri:
    url: "{{ unraid_graphql_url }}"
    method: POST
    headers:
      x-api-key: "{{ _unraid_api_key }}"
      Content-Type: application/json
    body_format: json
    body:
      query: "{ systemTime { useNtp ntpServers } }"
    return_content: true
    status_code: 200
    validate_certs: false
  delegate_to: localhost
  become: false
  run_once: true
  register: _systime_after
  no_log: true
  changed_when: false
  when:
    - _current_ntp != _desired_ntp
    - not ansible_check_mode
  tags: [unraid_settings, api]

- name: Verify NTP applied correctly
  ansible.builtin.assert:
    that:
      - (_systime_after.json.data.systemTime.ntpServers | reject('equalto', '') | list) == _desired_ntp
    success_msg: "NTP verified = {{ _desired_ntp }}"
    fail_msg: "NTP verify FAILED: live={{ _systime_after.json.data.systemTime.ntpServers }}"
  delegate_to: localhost
  run_once: true
  when:
    - _current_ntp != _desired_ntp
    - not ansible_check_mode
  tags: [unraid_settings, api]
