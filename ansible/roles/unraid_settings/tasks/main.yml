---
# unraid_settings orchestrator — FILE + MANUAL lanes only.
# API-settable settings (NTP/SSH/identity/UPS/Connect) are declarative in
# terraform/unraid/ (Terraform-GraphQL), NOT here.
# Tags: --tags preflight,drift (read-only report) | --tags preflight,recapture (refresh snapshot)

- name: Preflight checks and guards
  ansible.builtin.import_tasks: preflight.yml
  tags: [unraid_settings, preflight]

- name: Re-capture flash config snapshot (read-only on NAS)
  ansible.builtin.import_tasks: recapture.yml
  when: recapture_enabled | bool
  tags: [unraid_settings, recapture]

- name: Detect configuration drift (read-only)
  ansible.builtin.import_tasks: drift.yml
  when: drift_check_enabled | bool
  tags: [unraid_settings, drift]

- name: File lane - /boot/config writes (Phase 2 scaffold)
  ansible.builtin.import_tasks: file-scaffold.yml
  when: file_lane_enabled | bool
  tags: [unraid_settings, file]
