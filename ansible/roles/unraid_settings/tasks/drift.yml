---
# Drift detection (read-only). NAS reads use raw (no Python needed). NTP is owned by
# terraform/unraid/ now, so it is NOT checked here. Reports the network.cfg DNS mode
# (expected Automatic / DHCP-provided) and writes a JSON artifact (gitignored).

- name: Read DNS mode + static DNS1 from live network.cfg (raw; MANUAL lane)
  ansible.builtin.raw: "awk -F'\"' '/^DHCP_KEEPRESOLV=/{k=$2} /^DNS_SERVER1=/{d=$2} END{print k\"|\"d}' /boot/config/network.cfg"
  register: _live_dnscfg_raw
  changed_when: false
  tags: [unraid_settings, drift]

- name: Read effective resolver(s) from live /etc/resolv.conf (raw)
  ansible.builtin.raw: "awk '/^nameserver/{printf \"%s \", $2}' /etc/resolv.conf"
  register: _live_resolv_raw
  changed_when: false
  tags: [unraid_settings, drift]

- name: Normalize drift facts
  ansible.builtin.set_fact:
    _dns_keepresolv: "{{ (_live_dnscfg_raw.stdout | trim).split('|')[0] }}"
    _dns_static1: "{{ ((_live_dnscfg_raw.stdout | trim).split('|') + ['', ''])[1] }}"
    _live_resolvers: "{{ _live_resolv_raw.stdout | trim | split() }}"
  tags: [unraid_settings, drift]

- name: Derive DNS mode
  ansible.builtin.set_fact:
    _dns_mode: "{{ 'Static' if _dns_keepresolv == 'yes' else 'Automatic' }}"
  tags: [unraid_settings, drift]

- name: Report DNS state (MANUAL lane - informational; DNS is DHCP-provided by design)
  ansible.builtin.debug:
    msg: >-
      DNS [MANUAL lane]: mode={{ _dns_mode }} (expected {{ unraid_dns_expected_mode }}, DHCP-provided)
      effective={{ _live_resolvers | join(',') }}
      {{ 'OK' if _dns_mode == unraid_dns_expected_mode else '-> DRIFT: pinned Static; expected Automatic. DNS authority belongs at the Technitium DHCP scope, not the NAS.' }}
  tags: [unraid_settings, drift]

- name: Ensure artifact dir exists (controller)
  ansible.builtin.file:
    path: "{{ unraid_artifact_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  run_once: true
  tags: [unraid_settings, drift, artifact]

- name: Write drift report artifact (controller)
  ansible.builtin.copy:
    dest: "{{ unraid_artifact_dir }}/drift-report.json"
    mode: "0644"
    content: "{{ _drift | to_nice_json }}"
  vars:
    _drift:
      host: "{{ inventory_hostname }}"
      note: "NTP and other API settings are managed by terraform/unraid/ (Terraform-GraphQL)."
      dns:
        mode: "{{ _dns_mode }}"
        expected_mode: "{{ unraid_dns_expected_mode }}"
        static_server1: "{{ _dns_static1 }}"
        effective_resolvers: "{{ _live_resolvers }}"
        in_sync: "{{ _dns_mode == unraid_dns_expected_mode }}"
        lane: manual
  delegate_to: localhost
  become: false
  changed_when: false
  tags: [unraid_settings, drift, artifact]
