---
# unraid_settings - FILE + MANUAL lane IaC for the Unraid NAS (nas.owl.red).
# API-settable settings (NTP / SSH / identity / UPS / Connect) are managed declaratively in
# terraform/unraid/ (Terraform-GraphQL) - NOT here. This role does read-only drift detection +
# flash-config recapture, and (Phase 2) allow-listed /boot/config file writes.

# === Lane toggles (writes default OFF) ===
recapture_enabled: true   # read-only: refresh the committed flash snapshot
drift_check_enabled: true # read-only: report live-vs-desired drift
file_lane_enabled: false  # file-lane /boot/config writes (Phase 2; not implemented)

# === DNS - DRIFT-DETECT ONLY (MANUAL/lockout lane; never written) ===
# Decision (2026-06-18): NAS DNS stays DHCP-provided (Automatic); authority is the Technitium scope.
unraid_dns_expected_mode: "Automatic"

# === Re-capture target + artifact dir ===
recapture_local_dir: "{{ playbook_dir }}/../../unraid/flash-config"
unraid_artifact_dir: "{{ playbook_dir }}/../artifacts/unraid"

# === Files fetched for recapture (read-only). network.cfg/go/super.dat/secrets ABSENT. ===
unraid_cfg_fetch_list:
  - disk.cfg
  - docker.cfg
  - domain.cfg
  - editor.cfg
  - flash.cfg
  - ident.cfg
  - network-extra.cfg
  - network-rules.cfg
  - share.cfg
  - smb-extra.conf

# === Files the FILE lane may ever WRITE (Phase 2). Never manual/secret files. ===
unraid_cfg_write_allowlist:
  - ident.cfg
  - share.cfg
  - smb-extra.conf
  - docker.cfg

# === Hard-excluded: must NEVER be in fetch_list or write_allowlist (preflight guard). ===
unraid_cfg_hard_excluded:
  - myservers.cfg
  - network.cfg
  - "go"
  - super.dat
  - passwd
  - shadow
  - smbpasswd
  - secrets.tdb

unraid_shares:
  - appdata
  - backups
  - isos
  - media
  - sharefiles
  - system
  - vms
