---
proxmox_disable_enterprise_repo: true
proxmox_manage_no_subscription_repo: true
proxmox_manage_ceph_repo: false

proxmox_repo_suite: "{{ ansible_facts.distribution_release | default('bookworm') }}"
proxmox_enterprise_repo_uri: "https://enterprise.proxmox.com/debian/pve"
proxmox_no_subscription_repo_uri: "http://download.proxmox.com/debian/pve"
proxmox_repo_signed_by: "/usr/share/keyrings/proxmox-archive-keyring.gpg"

proxmox_ceph_release: "ceph-squid"
proxmox_ceph_repo_channel: "no-subscription"

proxmox_monitoring_packages:
  - smartmontools
  - lm-sensors
  - nvme-cli

proxmox_collect_health_facts: true
proxmox_health_output_dir: "{{ validation_output_dir }}/proxmox-prep"

proxmox_nic_hardening_enabled: true
proxmox_nic_hardening_target_interfaces:
  - nic0
  - onboard
proxmox_nic_hardening_disable_eee: true
proxmox_nic_hardening_set_e1000e_module_options: true
proxmox_nic_hardening_e1000e_module_options:
  SmartPowerDownEnable: 0
proxmox_nic_hardening_disable_pcie_aspm: true
proxmox_nic_hardening_reboot_if_needed: false
proxmox_nic_hardening_reboot_timeout: 1200